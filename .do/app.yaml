name: student-career-counselor

services:
  - name: backend
    source_dir: backend
    github:
      branch: main
      deploy_on_push: true
    run_command: node server.js
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: FRONTEND_URL
        scope: RUN_TIME
      # Database — fill in after creating a Managed PostgreSQL DB or link via DO DB
      - key: DB_HOST
        scope: RUN_TIME
      - key: DB_PORT
        value: "25060"
        scope: RUN_TIME
      - key: DB_NAME
        scope: RUN_TIME
      - key: DB_USER
        scope: RUN_TIME
      - key: DB_PASSWORD
        scope: RUN_TIME
      - key: DB_SSL
        value: "true"
      # Secrets — set these in the DO dashboard / deploy wizard
      - key: JWT_SECRET
        scope: RUN_TIME
      - key: UPGRADE_TOKEN_SECRET
        scope: RUN_TIME
      - key: RAZORPAY_KEY_ID
        scope: RUN_TIME
      - key: RAZORPAY_KEY_SECRET
        scope: RUN_TIME
      - key: SMTP_HOST
        scope: RUN_TIME
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        scope: RUN_TIME
      - key: SMTP_PASSWORD
        scope: RUN_TIME
      - key: EMAIL_FROM_NAME
        value: "Akash Universal Solutions"
      - key: EMAIL_FROM_ADDRESS
        value: "adish@akashuniversalsolutions.com"
      - key: LLM_PROVIDER
        value: "static"
      - key: OPENAI_API_KEY
        scope: RUN_TIME
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
      - key: GEMINI_API_KEY
        scope: RUN_TIME
      - key: PDF_STORAGE_PATH
        value: "./storage/pdfs"

static_sites:
  - name: frontend
    source_dir: frontend
    github:
      branch: main
      deploy_on_push: true
    build_command: npm run build
    output_dir: dist
    environment_slug: node-js
    routes:
      - path: /
    envs:
      - key: VITE_RAZORPAY_KEY_ID
        scope: RUN_TIME
    catchall_document: index.html

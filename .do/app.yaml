name: student-career-counselor

databases:
  - name: db
    engine: PG
    version: "16"
    size: basic
    num_nodes: 1

services:
  - name: backend
    source_dir: backend
    github:
      repo: adishakash/Student-Career-Counselor
      branch: main
      deploy_on_push: true
    build_command: npm ci
    run_command: node server.js
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: FRONTEND_URL
        value: "https://www.cadgurukul.com,${APP_URL}"
      # Database — linked managed PostgreSQL, DATABASE_URL injected automatically
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      # Secrets — set these in the DO dashboard / deploy wizard
      - key: JWT_SECRET
        scope: RUN_TIME
      - key: UPGRADE_TOKEN_SECRET
        scope: RUN_TIME
      - key: RAZORPAY_KEY_ID
        scope: RUN_TIME
      - key: RAZORPAY_KEY_SECRET
        scope: RUN_TIME
      - key: SMTP_HOST
        scope: RUN_TIME
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        scope: RUN_TIME
      - key: SMTP_PASSWORD
        scope: RUN_TIME
      - key: EMAIL_FROM_NAME
        value: "CAD Gurukul"
      - key: EMAIL_FROM_ADDRESS
        value: "contact@cadgurukul.com"
      - key: LLM_PROVIDER
        value: "static"
      - key: OPENAI_API_KEY
        scope: RUN_TIME
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
      - key: GEMINI_API_KEY
        scope: RUN_TIME
      - key: PDF_STORAGE_PATH
        value: "./storage/pdfs"
      - key: PDF_BASE_URL
        value: "https://www.cadgurukul.com/pdfs"

static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: adishakash/Student-Career-Counselor
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    routes:
      - path: /
    envs:
      - key: VITE_RAZORPAY_KEY_ID
        scope: RUN_TIME
    catchall_document: index.html
